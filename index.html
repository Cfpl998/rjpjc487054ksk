<!-- 详情弹窗 -->
<div id="detail_modal" class="fixed inset-0 bg-black bg-opacity-70 z-50 hidden flex justify-center items-center p-4">

      <button onclick="toDownload('https://xmcyw.91svip.eu.cc/')" class="w-full bg-indigo-600 text-white py-2 rounded-lg">立即下载</button>
    </div>

<script>
// ================= 多卡配置（可添加多个） =================
const VALID_KEYS = ["test123", "demo456", "vip77"];

// 🔴 核心修改：获取“卡密已被哪个设备使用”的存储
function getLockedMap() {
    return JSON.parse(localStorage.getItem("locked_map") || "{}");
}

// 🔴 核心修改：保存卡密与设备的绑定
function saveLockedMap(key, deviceId) {
    const map = getLockedMap();
    map[key] = deviceId;
    localStorage.setItem("locked_map", JSON.stringify(map));
}

// 🔴 核心修改：生成简单设备ID（不干扰你原有样式）
function getDeviceId() {
    const ua = navigator.userAgent;
    const screen = window.screen.width + "x" + window.screen.height;
    return btoa(ua + screen).substring(0, 20);
}

// 卡密验证
document.getElementById("btn_login").addEventListener("click", () => {
    const val = document.getElementById("input_code").value.trim();
    const tip = document.getElementById("err_tip");
    const currentDevice = getDeviceId();
    const lockedMap = getLockedMap();

    // 1. 检查卡密是否有效
    if (!VALID_KEYS.includes(val)) {
        tip.classList.remove("hidden");
        setTimeout(() => tip.classList.add("hidden"), 2000);
        return;
    }

    // 2. 🔴 核心逻辑：
    //    如果卡密已被锁定，且锁定的不是当前设备 → 报错
    //    如果卡密已被当前设备锁定 → 直接通过
    if (lockedMap[val]) {
        if (lockedMap[val] !== currentDevice) {
            tip.classList.remove("hidden");
            setTimeout(() => tip.classList.add("hidden"), 2000);
            return;
        }
    } else {
        // 3. 第一次使用 → 锁定给当前设备
        saveLockedMap(val, currentDevice);
    }

    // 4. 验证成功
    document.getElementById("login_page").classList.add("hidden");
    document.getElementById("app_page").classList.remove("hidden");
});


// 下载跳转
function toDownload(url) {
  window.open(url, "_blank");
}

// 详情弹窗
function openDetail(title, desc, platform) {
  document.getElementById("detail_title").innerText = title;
  document.getElementById("detail_desc").innerText = desc;
  document.getElementById("detail_platform").innerText = "支持：" + platform;
  document.getElementById("detail_modal").classList.remove("hidden");
}
function closeDetail() {
  document.getElementById("detail_modal").classList.add("hidden");
}

// 分类筛选
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".filter-btn").forEach(b => {
      b.classList.remove("active", "bg-indigo-600", "text-white");
      b.classList.add("bg-gray-200");
    });
    this.classList.add("active", "bg-indigo-600", "text-white");
    this.classList.remove("bg-gray-200");
    const cat = this.dataset.cat;
    document.querySelectorAll(".app-item").forEach(item => {
      if (cat === "all" || item.dataset.cat === cat) {
        item.classList.remove("hidden");
      } else {
        item.classList.add("hidden");
      }
    });
  });
});
</script>
